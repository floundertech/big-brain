name: big-brain

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bigbrain
      POSTGRES_USER: bigbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigbrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bigbrain:${POSTGRES_PASSWORD:-changeme}@db:5432/bigbrain
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      DT_OTLP_ENDPOINT: ${DT_OTLP_ENDPOINT:-}
      DT_API_TOKEN: ${DT_API_TOKEN:-}
      GMAIL_POLL_INTERVAL_SECONDS: ${GMAIL_POLL_INTERVAL_SECONDS:-300}
      GMAIL_INGEST_LABEL: ${GMAIL_INGEST_LABEL:-big-brain}
      GMAIL_DONE_LABEL: ${GMAIL_DONE_LABEL:-big-brain/done}
      MINIFLUX_URL: ${MINIFLUX_URL:-}
      MINIFLUX_API_KEY: ${MINIFLUX_API_KEY:-}
      RSS_POLL_INTERVAL_SECONDS: ${RSS_POLL_INTERVAL_SECONDS:-3600}
      RSS_DIGEST_HOUR: ${RSS_DIGEST_HOUR:-5}
      RSS_DIGEST_MODEL: ${RSS_DIGEST_MODEL:-claude-haiku-4-5-20251001}
      RSS_RELEVANCE_TOPICS: ${RSS_RELEVANCE_TOPICS:-}
      RSS_INITIAL_BACKFILL_DAYS: ${RSS_INITIAL_BACKFILL_DAYS:-30}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - embed_cache:/root/.cache/huggingface
      - ./gmail_token.json:/app/gmail_token.json:ro

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}

volumes:
  db_data:
  embed_cache:
